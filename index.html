<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RNGdle EP Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fafafa; --surface: #fff; --surface-hover: #f0f0f0; --border: #ddd;
  --text: #1a1a1a; --text-2: #666; --text-3: #999;
  --mythic: #dc2626; --anomaly: #ea580c; --epic: #9333ea;
  --rare: #2563eb; --uncommon: #16a34a; --common: #888;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface-hover: #252525; --border: #333;
    --text: #eee; --text-2: #999; --text-3: #666;
    --mythic: #f87171; --anomaly: #fb923c; --epic: #c084fc;
    --rare: #60a5fa; --uncommon: #4ade80; --common: #888;
  }
}
body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); font-size: 14px; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
header h1 { font-size: 18px; letter-spacing: 1px; text-transform: uppercase; }
header .subtitle { font-size: 11px; color: var(--text-2); }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.controls select, .controls button { font-family: inherit; font-size: 12px; padding: 4px 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; border-radius: 3px; }
.controls select:hover, .controls button:hover { background: var(--surface-hover); }
input[type=number] { font-family: inherit; font-size: 12px; padding: 4px 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); width: 100px; border-radius: 3px; }
input[type=number]:focus { outline: none; border-color: var(--text-2); }
.progress-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 6px 20px; font-size: 11px; color: var(--text-2); display: flex; align-items: center; gap: 12px; }
.progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar-inner { height: 100%; width: 0%; background: var(--epic); transition: width .2s; border-radius: 3px; }
.progress-text { white-space: nowrap; }
.container { padding: 12px 20px; overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
.tbl th:hover { color: var(--text-2); }
.tbl th .arrow { margin-left: 4px; font-size: 10px; }
.tbl td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
.tbl tr:hover td { background: var(--surface-hover); }
.tbl .num { cursor: pointer; font-weight: bold; }
.tbl .num:hover { text-decoration: underline; }
.rarity-mythic { color: var(--mythic); }
.rarity-anomaly { color: var(--anomaly); }
.rarity-epic { color: var(--epic); }
.rarity-rare { color: var(--rare); }
.rarity-uncommon { color: var(--uncommon); }
.rarity-common { color: var(--common); }
.badge-tags { display: flex; gap: 3px; flex-wrap: wrap; }
.badge-tag { font-size: 10px; padding: 1px 5px; border-radius: 2px; border: 1px solid; white-space: nowrap; cursor: default; position: relative; }
.badge-tag:hover { opacity: .8; }
.badge-more { font-size: 10px; color: var(--text-3); cursor: default; padding: 1px 4px; }
.view-btn { font-size: 10px; cursor: pointer; color: var(--text-2); padding: 1px 6px; border: 1px solid var(--border); border-radius: 3px; background: var(--surface); }
.view-btn:hover { background: var(--surface-hover); color: var(--text); }
.tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 11px; padding: 6px 10px; border-radius: 4px; white-space: nowrap; z-index: 50; pointer-events: none; line-height: 1.4; text-align: center; }
.tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--text); }
.badge-tag:hover .tooltip { display: block; }
.pagination { display: flex; align-items: center; gap: 8px; padding: 10px 0; font-size: 12px; }
.pagination button { font-family: inherit; font-size: 12px; padding: 3px 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; border-radius: 3px; }
.pagination button:disabled { opacity: .4; cursor: default; }
.pagination button:not(:disabled):hover { background: var(--surface-hover); }
.pagination span { color: var(--text-2); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; max-width: 520px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
.modal h2 { font-size: 16px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .5px; }
.modal .ep-total { font-size: 24px; font-weight: bold; margin-bottom: 16px; }
.modal .close { float: right; cursor: pointer; font-size: 20px; color: var(--text-2); background: none; border: none; line-height: 1; }
.modal .close:hover { color: var(--text); }
.modal .badge-list { display: flex; flex-direction: column; gap: 5px; }
.modal .badge-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; border-radius: 4px; background: var(--surface-hover); }
.modal .badge-row .info { display: flex; align-items: center; gap: 6px; }
.modal .badge-row .ep-val { font-weight: bold; white-space: nowrap; }
.modal .badge-row .ep-val.zero { color: var(--text-3); }
.empty { padding: 40px; text-align: center; color: var(--text-2); }
a { color: var(--text-2); }
a:hover { color: var(--text); }
</style>
</head>
<body>
<header>
  <div><h1>RNGdle EP Explorer</h1><div class="subtitle">Scores for 0 – 999,999 · <a href="https://github.com/CubityFirst/rngdle-ep-calculator" target="_blank">rngdle-ep-calculator</a></div></div>
  <div class="controls">
    <select id="filterLen"><option value="0">All lengths</option><option value="1">1 digit</option><option value="2">2 digits</option><option value="3">3 digits</option><option value="4">4 digits</option><option value="5">5 digits</option><option value="6">6 digits</option></select>
    <select id="sortSelect"><option value="ep-desc">EP ↓</option><option value="ep-asc">EP ↑</option><option value="num">Number</option><option value="count">Badge count</option></select>

    <button id="resetBtn">Reset</button>
  </div>
</header>
<div class="progress-wrap">
  <span class="progress-text" id="progressText">Starting…</span>
  <div class="progress-bar"><div class="progress-bar-inner" id="progressBar"></div></div>
  <span id="statusText"></span>
  <span id="percentile" style="margin-left:auto;font-weight:bold;color:var(--text)"></span>
</div>
<div class="container">
  <div id="tableWrap"><div class="empty">Computing… results appear progressively.</div></div>
  <div class="pagination" id="pagination"></div>
  <button id="dlCacheBtn" style="display:none;font-size:10px;color:var(--text-3);border:1px solid var(--border);background:var(--surface);padding:3px 8px;border-radius:3px;cursor:pointer;float:right">Download Cache</button>
</div>
<div class="modal-overlay" id="modal"><div class="modal">
  <button class="close" id="modalClose">&times;</button>
  <h2 id="modalTitle">Number</h2>
  <div class="ep-total" id="modalEp"></div>
  <div class="badge-list" id="modalBadges"></div>
</div></div>

<script>
// ============================================================
// RNGdle EP engine  —  ported from CubityFirst/rngdle-ep-calculator
// ============================================================
function ipow(b,e){let r=1;for(let i=0;i<e;i++)r*=b;return r}
function isPerfectPower(n,exp){if(n<=1)return true;for(let b=2;;b++){const v=ipow(b,exp);if(v>n)return false;if(v===n)return true}}
function isPrime(n){if(n<2)return false;if(n%2===0)return n===2;for(let i=3;i*i<=n;i+=2)if(n%i===0)return false;return true}
function partitions(str,count){const res=[];(function rec(s,p){if(p.length===count){if(s===str.length)res.push(p.slice());return}const rem=count-p.length;for(let e=s+1;e<=str.length-(rem-1);e++){p.push(str.slice(s,e));rec(e,p);p.pop()}})(0,[]);return res}
function consecAsc(str,count,multiDigit){for(const p of partitions(str,count)){if(!p.every(x=>x.length===1||x[0]!=='0'))continue;if(multiDigit&&!p.some(x=>x.length>=2))continue;const n=p.map(Number);let ok=true;for(let i=1;i<n.length;i++)if(n[i]-n[i-1]!==1){ok=false;break}if(ok)return true}return false}
function consecScrambled(str,count){for(const p of partitions(str,count)){if(!p.every(x=>x.length===1||x[0]!=='0'))continue;const n=p.map(Number);const s=[...n].sort((a,b)=>a-b);let i=true;for(let k=1;k<s.length;k++)if(s[k]-s[k-1]!==1){i=false;break}if(!i)continue;let a=true;for(let k=1;k<n.length;k++)if(n[k]-n[k-1]!==1){a=false;break}if(!a)return true}return false}
function pairNearby(s,multiDigit){const subs=[];for(let i=0;i<s.length;i++)for(let j=i+1;j<=s.length;j++){const t=s.slice(i,j);if(t.length===1||t[0]!=='0')subs.push({v:Number(t),i,j})}for(const a of subs)for(const b of subs)if(a.j<=b.i&&b.i-a.j>=1&&b.v===a.v+1&&(!multiDigit||(a.j-a.i>=2||b.j-b.i>=2)))return true;return false}
function straightRun(d,L){for(let i=0;i+L<=d.length;i++){let a=true,de=true;for(let k=1;k<L;k++){if(d[i+k]-d[i+k-1]!==1)a=false;if(d[i+k]-d[i+k-1]!==-1)de=false}if(a||de)return true}return false}
function mountain(d){const n=d.length;if(n<3)return false;let i=0;while(i+1<n&&d[i]<d[i+1])i++;if(i===0||i===n-1)return false;while(i+1<n&&d[i]>d[i+1])i++;return i===n-1}
function valley(d){const n=d.length;if(n<3)return false;let i=0;while(i+1<n&&d[i]>d[i+1])i++;if(i===0||i===n-1)return false;while(i+1<n&&d[i]<d[i+1])i++;return i===n-1}
function hills(d){if(d.length<3)return false;let p=0;for(let i=1;i<d.length;i++){const di=d[i]-d[i-1];if(di===0)return false;const s=di>0?1:-1;if(p!==0&&s===p)return false;p=s}return true}
function strictInc(d){for(var i=1;i<d.length;i++)if(d[i]<=d[i-1])return false;return d.length>=2}
function strictDec(d){for(var i=1;i<d.length;i++)if(d[i]>=d[i-1])return false;return d.length>=2}
function consecInc(d){for(var i=1;i<d.length;i++)if(d[i]-d[i-1]!==1)return false;return d.length>=2}
function consecDec(d){for(var i=1;i<d.length;i++)if(d[i]-d[i-1]!==-1)return false;return d.length>=2}
function arithmetic(d){if(d.length<3)return false;var diff=d[1]-d[0];for(var i=2;i<d.length;i++)if(d[i]-d[i-1]!==diff)return false;return true}
function absArith(d){if(d.length<3)return false;var a=Math.abs(d[1]-d[0]);for(var i=2;i<d.length;i++)if(Math.abs(d[i]-d[i-1])!==a)return false;return true}
function turtle(d){if(d.length<2)return false;for(var i=1;i<d.length;i++)if(Math.abs(d[i]-d[i-1])>1)return false;return true}
function alternator(d){if(d.length<2)return false;for(var i=1;i<d.length;i++)if(d[i]%2===d[i-1]%2)return false;return true}
function allSameParity(d){if(d.length<1)return false;var p=d[0]%2;for(var i=1;i<d.length;i++)if(d[i]%2!==p)return false;return true}
function runLengths(s){const r=[];let i=0;while(i<s.length){let j=i;while(j<s.length&&s[j]===s[i])j++;r.push(j-i);i=j}return r}
function strobogrammatic(s){const m={'0':'0','1':'1','6':'9','8':'8','9':'6'};let o='';for(let i=s.length-1;i>=0;i--){const c=m[s[i]];if(c===undefined)return false;o+=c}return o===s}
function pLeadingZero(s){return s.length>1&&s[0]==='0'}
function pMultiPart(p){return p.some(x=>x.length>=2)}
function pConsecSet(n){const t=[...n].sort((a,b)=>a-b);for(let i=1;i<t.length;i++)if(t[i]-t[i-1]!==1)return false;return true}
function pDigitCounts(s){const m=new Map();for(const c of s)m.set(c,(m.get(c)||0)+1);return m}
function pContig(s,digit,count){return s.includes(digit.repeat(count))}
function pOrdered(n){if(n.length<2)return true;let inc=true,dec=true;for(let i=1;i<n.length;i++){if(n[i]<=n[i-1])inc=false;if(n[i]>=n[i-1])dec=false}return inc||dec}
function pHasSequence(s,len,strictAsc){if(strictAsc===undefined)strictAsc=true;if(s.length<len||len<=0)return false;for(let i=0;i<=s.length-len;i++){const a=s.charCodeAt(i);if(strictAsc){let ok=true;for(let k=1;k<len;k++)if(s.charCodeAt(i+k)!==a+k){ok=false;break}if(ok)return true}else{const dir=s.charCodeAt(i+1)-a;if(dir===1||dir===-1){let ok=true;for(let k=1;k<len;k++)if(s.charCodeAt(i+k)!==a+k*dir){ok=false;break}if(ok)return true}}}return false}
function pPairExact(s){for(let t=1;t<s.length;t++){const i=s.slice(0,t),r=s.slice(t);if(pLeadingZero(i)||pLeadingZero(r)||!pMultiPart([i,r]))continue;const a=parseInt(i,10),b=parseInt(r,10);if(Math.abs(a-b)===1)return{numbers:[a,b],splits:[0,t]}}return null}
function pTripleExact(s){for(let t=1;t<s.length-1;t++)for(let i=t+1;i<s.length;i++){const p=[s.slice(0,t),s.slice(t,i),s.slice(i)];if(p.some(pLeadingZero)||!pMultiPart(p))continue;const n=p.map(x=>parseInt(x,10));if(pConsecSet(n))return{numbers:n,splits:[0,t,i]}}return null}
function pQuadExact(s){for(let t=1;t<s.length-2;t++)for(let i=t+1;i<s.length-1;i++)for(let r=i+1;r<s.length;r++){const p=[s.slice(0,t),s.slice(t,i),s.slice(i,r),s.slice(r)];if(p.some(pLeadingZero)||!pMultiPart(p))continue;const n=p.map(x=>parseInt(x,10));if(pConsecSet(n))return{numbers:n,splits:[0,t,i,r]}}return null}
function pPairAdjacent(s){for(let t=0;t<s.length;t++)for(let i=1;i<=s.length-t-1;i++){const r=s.slice(t,t+i);if(pLeadingZero(r))continue;const a=parseInt(r,10);for(const v of[a+1,a-1]){if(v<0)continue;const ns=v.toString(),o=t+i+ns.length;if(o>s.length)continue;const seg=s.slice(t+i,o);if(seg===ns&&pMultiPart([r,seg])){if(t===0&&o===s.length)continue;return{numbers:[a,v],splits:[t,t+i],start:t}}}}return null}
function pPairNearby(s){const subs=[];for(let i=0;i<s.length;i++)for(let r=1;r<=s.length-i;r++){const a=s.slice(i,i+r);if(!pLeadingZero(a))subs.push({value:parseInt(a,10),start:i,end:i+r,str:a})}for(let e=0;e<subs.length;e++)for(let i=e+1;i<subs.length;i++){const r=subs[e],a=subs[i];if(Math.abs(r.value-a.value)===1&&pMultiPart([r.str,a.str])&&((!(r.end>a.start)&&!(a.end>r.start))||r.end<=a.start||a.end<=r.start)&&r.end!==a.start&&a.end!==r.start)return{a:r,b:a}}return null}
function pNAdjacentBuild(s,start,firstLen,firstVal,dir,count){const n=[firstVal],sp=[start];let cu=start+firstLen;const p=[s.slice(start,start+firstLen)];for(let k=1;k<count;k++){const v=firstVal+k*dir;if(v<0)return null;const vs=v.toString();if(cu+vs.length>s.length)return null;const seg=s.slice(cu,cu+vs.length);if(seg!==vs)return null;n.push(v);sp.push(cu);p.push(seg);cu+=vs.length}return pMultiPart(p)?{numbers:n,splits:sp,start,end:cu}:null}
function pNAdjacentAt(s,count,start){if(count<2)return null;for(let len=1;len<=s.length-start-(count-1);len++){const part=s.slice(start,start+len);if(pLeadingZero(part))continue;const val=parseInt(part,10);const u=pNAdjacentBuild(s,start,len,val,1,count);if(u)return u;const d=pNAdjacentBuild(s,start,len,val,-1,count);if(d)return d}return null}
function pNAdjacent(s,count){for(let i=0;i<s.length;i++){const r=pNAdjacentAt(s,count,i);if(r&&!(r.start===0&&r.end===s.length))return r}return null}
function pContigPairStarts(s){const c=pDigitCounts(s);const st=[];for(const[d,n]of c)if(n===2&&pContig(s,d,2)){for(let t=0;t<s.length-1;t++)if(s[t]===d&&s[t+1]===d){st.push(t);break}}st.sort((a,b)=>a-b);return st}

// compute() — single number
// ============================================================
function compute(n){
  var s=String(n);
  var d=s.split('').map(function(c){return c.charCodeAt(0)-48});
  var counts={};
  for(var i=0;i<d.length;i++)counts[d[i]]=(counts[d[i]]||0)+1;
  var c={
    n:n,s:s,len:s.length,d:d,counts:counts,
    distinct:Object.keys(counts).length,
    sum:d.reduce(function(a,b){return a+b},0),
    prod:d.reduce(function(a,b){return a*b},1),
    maxCount:Math.max.apply(null,Object.values(counts)),
    has:function(sub){return s.indexOf(sub)!==-1},
    cnt:function(digit){return counts[digit]||0},
    countExact:function(k){return Object.values(counts).filter(function(v){return v===k}).length},
    runs:runLengths(s)
  };
  var earned=[];
  for(var i=0;i<BADGES.length;i++){
    var b=BADGES[i];var ok=false;
    try{ok=b[5](c)}catch(e){}
    if(ok)earned.push({id:b[0],label:b[1],emoji:b[2],ep:b[3],rarity:b[4],desc:DESCRIPTIONS[b[0]],prob:PROBABILITIES[b[0]]});
  }
  for(var f=0;f<FAMILIES.length;f++){
    var fam=FAMILIES[f];var members=[];
    for(var e=0;e<earned.length;e++)if(fam.indexOf(earned[e].id)!==-1)members.push(earned[e]);
    if(members.length<2)continue;
    var top=members[0];
    for(var e=1;e<members.length;e++)if(members[e].ep>top.ep)top=members[e];
    for(var e=0;e<members.length;e++)if(members[e]!==top)members[e].ep=0;
  }
  var total=0;for(var i=0;i<earned.length;i++)total+=earned[i].ep;
  earned.sort(function(a,b){return b.ep-a.ep});
  return{number:n,totalEP:total,count:earned.length,badges:earned};
}

  return badgeCache[n];
}

function rarityColor(r){var map={Mythic:'var(--mythic)',Anomaly:'var(--anomaly)',Epic:'var(--epic)',Rare:'var(--rare)',Uncommon:'var(--uncommon)',Common:'var(--common)'};return map[r]||'#888'}
function formatEP(v){return v.toLocaleString()}

function renderTable(){
  var wrap=document.getElementById('tableWrap');
  var sorted=filtered.slice().sort(function(a,b){
    var cmp=0;
    if(sortField==='num')cmp=a.number-b.number;
    else if(sortField==='totalEP')cmp=a.totalEP-b.totalEP;
    else if(sortField==='count')cmp=a.count-b.count;
    else if(sortField==='len')cmp=(a.len||String(a.number).length)-(b.len||String(b.number).length);
    return cmp*sortDir;
  });
  var totalPages=Math.max(1,Math.ceil(sorted.length/ROWS_PER_PAGE));
  if(currentPage>totalPages)currentPage=totalPages;
  var start=(currentPage-1)*ROWS_PER_PAGE;
  var page=sorted.slice(start,start+ROWS_PER_PAGE);
  if(sorted.length===0){wrap.innerHTML='<div class="empty">No results match the current filters.</div>';return}
  var sortArrow=sortDir===-1?'\u25BC':'\u25B2';
  var h='<table class="tbl"><thead><tr>'+
    '<th onclick="sortBy(\'num\')"># '+(sortField==='num'?sortArrow:'')+'</th>'+
    '<th onclick="sortBy(\'totalEP\')">Total EP '+(sortField==='totalEP'?sortArrow:'')+'</th>'+
    '<th onclick="sortBy(\'len\')">Len '+(sortField==='len'?sortArrow:'')+'</th>'+
    '<th onclick="sortBy(\'count\')">Badges '+(sortField==='count'?sortArrow:'')+'</th>'+
    '<th>Top Badges</th></tr></thead><tbody>';
  for(var r=0;r<page.length;r++){
    var row=page[r];
    var len=row.len||String(row.number).length;
    var badges=row.badges||getBadges(row.number).badges;
    var topB=[];for(var i=0;i<badges.length;i++){if(badges[i].ep>0)topB.push(badges[i]);if(topB.length>=5)break}
    var tags='';
    for(var i=0;i<topB.length;i++){
      var b=topB[i];
      var tip=(b.desc||'')+(b.prob?' | '+b.prob.toFixed(4)+'%':'')+' | '+b.rarity;
      tags+='<span class="badge-tag" style="border-color:'+rarityColor(b.rarity)+';color:'+rarityColor(b.rarity)+'">'+b.emoji+' '+b.ep.toLocaleString()+'<span class="tooltip">'+tip+'</span></span>';
    }
    if(badges.length>5){
      tags+='<span class="badge-more">+'+(badges.length-5)+' more</span>';
    }
    h+='<tr><td class="num" onclick="showDetail('+row.number+')">'+String(row.number)+'</td>'+
      '<td><strong>'+formatEP(row.totalEP)+'</strong></td><td>'+len+'</td><td>'+row.count+'</td>'+
      '<td><div class="badge-tags">'+(tags||'\u2014')+' <span class="view-btn" onclick="showDetail('+row.number+')">View</span></div></td></tr>';
  }
  h+='</tbody></table>';
  wrap.innerHTML=h;
  var pag=document.getElementById('pagination');
  pag.innerHTML='<button onclick="goPage(1)"'+(currentPage<=1?'disabled':'')+'>\u00AB</button>'+
    '<button onclick="goPage('+(currentPage-1)+')"'+(currentPage<=1?'disabled':'')+'>\u2039</button>'+
    '<span>Page '+currentPage+' of '+totalPages+' ('+sorted.length.toLocaleString()+' numbers)</span>'+
    '<button onclick="goPage('+(currentPage+1)+')"'+(currentPage>=totalPages?'disabled':'')+'>\u203A</button>'+
    '<button onclick="goPage('+totalPages+')"'+(currentPage>=totalPages?'disabled':'')+'>\u00BB</button>';
}
function scheduleRender(){
  if(renderPending)return;
  renderPending=true;
  setTimeout(function(){renderPending=false;applyFilters()},250);
}

function sortBy(field){
  if(sortField===field)sortDir*=-1;
  else{sortField=field;sortDir=(field==='num'||field==='len')?1:-1}
  currentPage=1;renderTable()
}
function goPage(p){currentPage=p;renderTable()}

function applyFilters(){
  filterLen=parseInt(document.getElementById('filterLen').value);
  minEp=parseInt(document.getElementById('minEp').value)||0;
  var rawValue=document.getElementById('searchNum').value;
  var searchRaw=rawValue.replace(/[^0-9]/g,'');
  var searchNum=searchRaw?parseInt(searchRaw,10):-1;
  if(isNaN(searchNum))searchNum=-1;
  if(rawValue&&(searchNum<0||searchNum>=TOTAL_NUMBERS)){currentPage=1;renderTable();return}
  filtered=[];
  for(var i=0;i<allData.length;i++){
    var r=allData[i];var len=r.len||String(r.number).length;
    if(filterLen>0&&len!==filterLen)continue;
    if(r.totalEP<minEp)continue;
    if(searchNum>=0&&r.number!==searchNum)continue;
    filtered.push(r);
  }
  var pct=allData.length>0?(filtered.length/allData.length*100):0;
  document.getElementById('percentile').textContent=filtered.length.toLocaleString()+' numbers ('+pct.toFixed(4)+'%) ≥ '+minEp.toLocaleString()+' EP';
  currentPage=1;renderTable()
}

document.getElementById('filterLen').addEventListener('change',applyFilters);
document.getElementById('minEp').addEventListener('input',applyFilters);
document.getElementById('searchNum').addEventListener('input',function(){
  var v=this.value;
  if(v&&!/^[0-9,\s]*$/.test(v))return;
  applyFilters();
});
document.getElementById('sortSelect').addEventListener('change',function(){
  var v=this.value;
  if(v==='ep-desc'){sortField='totalEP';sortDir=-1}
  else if(v==='ep-asc'){sortField='totalEP';sortDir=1}
  else if(v==='num'){sortField='num';sortDir=1}
  else if(v==='count'){sortField='count';sortDir=-1}
  currentPage=1;renderTable()
});
document.getElementById('resetBtn').addEventListener('click',function(){
  document.getElementById('filterLen').value='0';
  document.getElementById('minEp').value='0';
  document.getElementById('searchNum').value='';
  document.getElementById('sortSelect').value='ep-desc';
  sortField='totalEP';sortDir=-1;applyFilters()
});

// ============================================================
// Detail modal
// ============================================================
function showDetail(n){
  var result=compute(n);
  document.getElementById('modalTitle').textContent='Number '+n.toLocaleString();
  document.getElementById('modalEp').innerHTML='Total EP: <strong>'+formatEP(result.totalEP)+'</strong> <span style="font-size:14px;color:var(--text-2);font-weight:normal">('+result.count+' badges)</span>';
  var html='';
  for(var i=0;i<result.badges.length;i++){
    var b=result.badges[i];
    var zc=b.ep===0?' zero':'';
    html+='<div class="badge-row"><div class="info"><span>'+b.emoji+'</span><span><strong>'+b.label+'</strong><br><span style="font-size:11px;color:var(--text-2)">'+(b.desc||'')+(b.prob?' ('+b.prob.toFixed(4)+'%)':'')+'</span></span></div>'+
      '<span class="ep-val'+zc+'" style="color:'+(b.ep>0?rarityColor(b.rarity):'var(--text-3)')+'">'+(b.ep>0?'+':'')+formatEP(b.ep)+'</span></div>';
  }
  document.getElementById('modalBadges').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
document.getElementById('modalClose').addEventListener('click',function(){document.getElementById('modal').classList.remove('open')});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===e.currentTarget)document.getElementById('modal').classList.remove('open')});
document.addEventListener('keydown',function(e){if(e.key==='Escape')document.getElementById('modal').classList.remove('open')});

// ============================================================
// IndexedDB caching
// ============================================================
var DB_NAME='rngdle_cache';
var DB_VERSION=1;
var STORE='results';

function dbOpen(){
  return new Promise(function(resolve,reject){
    var req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE,{keyPath:'number'});
      }
    };
    req.onsuccess=function(){resolve(req.result)};
    req.onerror=function(){reject(req.error)};
  });
}
function dbSaveBatch(db,items){
  return new Promise(function(resolve,reject){
    var tx=db.transaction(STORE,'readwrite');
    var store=tx.objectStore(STORE);
    for(var i=0;i<items.length;i++)store.put(items[i]);
    tx.oncomplete=function(){resolve()};
    tx.onerror=function(){reject(tx.error)};
  });
}
function dbGetAll(db){
  return new Promise(function(resolve,reject){
    var tx=db.transaction(STORE,'readonly');
    var store=tx.objectStore(STORE);
    var req=store.getAll();
    req.onsuccess=function(){resolve(req.result)};
    req.onerror=function(){reject(req.error)};
  });
}
function dbCount(db){
  return new Promise(function(resolve,reject){
    var tx=db.transaction(STORE,'readonly');
    var store=tx.objectStore(STORE);
    var req=store.count();
    req.onsuccess=function(){resolve(req.result)};
    req.onerror=function(){reject(req.error)};
  });
}

// ============================================================
// Chunked computation with IndexedDB save
// ============================================================
var CHUNK=500;
var nextNum=0;
var startTime=0;
var pText=document.getElementById('progressText');
var pBar=document.getElementById('progressBar');
var sText=document.getElementById('statusText');
var db=null;

function processChunk(){
  var end=Math.min(nextNum+CHUNK,TOTAL_NUMBERS);
  var batch=[];
  for(var n=nextNum;n<end;n++){
    var res=compute(n);
    allData.push(res);
    batch.push({number:res.number,totalEP:res.totalEP,count:res.count,len:res.len||String(res.number).length});
  }
  nextNum=end;
  if(db){
    dbSaveBatch(db,batch).catch(function(err){console.warn('IDB save failed',err)});
  }
  var pct=Math.round(nextNum/TOTAL_NUMBERS*100);
  pBar.style.width=pct+'%';
  scheduleRender();
  var elapsed=Date.now()-startTime;
  var rate=elapsed>0?Math.round(nextNum/(elapsed/1000)):0;
  sText.textContent=nextNum.toLocaleString()+' / '+TOTAL_NUMBERS.toLocaleString()+(rate?' ('+rate+'/s)':'');
  if(nextNum>=TOTAL_NUMBERS){
    pText.textContent='Done.';
    sText.textContent=TOTAL_NUMBERS.toLocaleString()+' numbers in '+((Date.now()-startTime)/1000).toFixed(1)+'s';
    document.getElementById('dlCacheBtn').style.display='inline';
    renderPending=false;
    applyFilters();
  }else{
    setTimeout(processChunk,0);
  }
}

// ============================================================
// Binary cache loading
// ============================================================
var CACHE_FILE='ep-cache.bin';
var CACHE_MAGIC=0x524E4743; // "RNGC"

function loadBinaryCache(){
  return fetch(CACHE_FILE).then(function(resp){
    if(!resp.ok)throw new Error('No cache file');
    return resp.arrayBuffer();
  }).then(function(buf){
    var dv=new DataView(buf);
    if(dv.getUint32(0,true)!==CACHE_MAGIC)throw new Error('Bad magic');
    if(dv.getUint8(4)!==1)throw new Error('Bad version');
    var count=dv.getUint32(5,true);
    if(count!==TOTAL_NUMBERS)throw new Error('Count mismatch');
    var off=9;
    allData=[];
    for(var n=0;n<count;n++){
      allData.push({
        number:n,
        totalEP:dv.getUint32(off,true),
        count:dv.getUint16(off+4,true),
        len:dv.getUint8(off+6)
      });
      off+=7;
    }
    nextNum=TOTAL_NUMBERS;
    pText.textContent='Loaded from binary cache ('+allData.length.toLocaleString()+' numbers).';
    pBar.style.width='100%';
    document.getElementById('dlCacheBtn').style.display='inline';
    applyFilters();
    return true;
  });
}

// ============================================================
// Binary cache download (run after full compute)
// ============================================================
function downloadCache(){
  var buf=new ArrayBuffer(9+allData.length*7);
  var dv=new DataView(buf);
  dv.setUint32(0,CACHE_MAGIC,true);
  dv.setUint8(4,1);
  dv.setUint32(5,allData.length,true);
  var off=9;
  for(var i=0;i<allData.length;i++){
    var r=allData[i];
    dv.setUint32(off,r.totalEP,true);
    dv.setUint16(off+4,r.count,true);
    dv.setUint8(off+6,r.len||String(r.number).length);
    off+=7;
  }
  var blob=new Blob([buf],{type:'application/octet-stream'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=CACHE_FILE;
  a.click();
  URL.revokeObjectURL(a.href);
}
document.getElementById('dlCacheBtn').addEventListener('click',downloadCache);

// Start: try binary cache first, then IDB cache, then compute fresh
pText.textContent='Starting\u2026';
loadBinaryCache().catch(function(){
  // Binary cache not available, try IDB
  return dbOpen().then(function(d){
    db=d;
    return dbCount(db);
  }).then(function(count){
    if(count===TOTAL_NUMBERS){
      return dbGetAll(db).then(function(items){
        for(var i=0;i<items.length;i++){
          var r=items[i];
          if(!r.len)r.len=String(r.number).length;
          allData.push(r);
        }
        nextNum=TOTAL_NUMBERS;
        applyFilters();
        pText.textContent='Loaded from cache ('+allData.length.toLocaleString()+' numbers).';
        pBar.style.width='100%';
        document.getElementById('dlCacheBtn').style.display='inline';
      });
    }else if(count>0){
      return dbGetAll(db).then(function(items){
        for(var i=0;i<items.length;i++){
          var r=items[i];
          if(!r.len)r.len=String(r.number).length;
          allData.push(r);
        }
        nextNum=allData.length;
        pText.textContent='Resuming from '+nextNum.toLocaleString()+'...';
        applyFilters();
        startTime=Date.now();
        setTimeout(processChunk,50);
      });
    }else{
      pText.textContent='Computing 0 \u2013 999,999\u2026';
      startTime=Date.now();
      setTimeout(processChunk,50);
    }
  });
}).catch(function(err){
  console.warn('All cache methods failed, computing fresh',err);
  pText.textContent='Computing 0 \u2013 999,999\u2026';
  startTime=Date.now();
  setTimeout(processChunk,50);
});
</script>
